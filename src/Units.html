<!-- Units.html — Units Management Page -->

<div class="page-header">
  <div>
    <h1 class="page-title">🏢 Units</h1>
    <p class="page-subtitle">Confident Daffodils Owners Association — 136 Units</p>
  </div>
</div>

<div class="filters-row">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="unit-search" placeholder="Search unit, owner, tenant, phone, bank name…" oninput="loadUnitsFilter()">
  </div>
  <select id="filter-tower" onchange="loadUnitsFilter()">
    <option value="">All Towers</option>
    <option value="A">Tower A</option>
    <option value="B">Tower B</option>
  </select>
  <select id="filter-status" onchange="loadUnitsFilter()">
    <option value="">All Status</option>
    <option value="Occupied">Occupied</option>
    <option value="Unoccupied">Unoccupied (UO)</option>
    <option value="Not-registered">Not-registered</option>
  </select>
  <button class="btn btn-outline btn-sm" id="view-toggle-btn" onclick="loadUnitsToggleView()">Grid View</button>
</div>

<div id="units-summary" style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;"></div>
<div id="units-display"><div class="loading"><div class="spinner"></div> Loading units…</div></div>

<style>
  /* Full grid lines (vertical included) for the list view, matching the
     Fees Received and Corpus Fund tables. */
  #units-display table { border-collapse: collapse; }
  #units-display th, #units-display td { border: 1px solid var(--border-strong, rgba(128,128,128,.35)); }
</style>

<script>
var unitsAll    = [];
var unitsView   = 'list'; // list is the default — grid duplicated the Dashboard's tower view

var unitOwnerMap  = {};   // unit -> owner obj
var unitTenantMap = {};   // unit -> tenant obj
var unitsPayMap   = {};   // 'UNIT|TYPE|YYYY-MM' -> amount (Verified)

// google.script.run occasionally fails with a transient "NetworkError:
// Connection failure due to HTTP 0" right after the app opens (before a
// refresh "fixes" it). Retry each fetch a couple of times with a short
// pause before giving up — onDone(result) on success, onDone(null, err)
// only once every attempt has failed.
function unitsRpc(action, params, onDone, attemptsLeft) {
  if (attemptsLeft === undefined) attemptsLeft = 3;
  google.script.run
    .withSuccessHandler(function(r) { onDone(r); })
    .withFailureHandler(function(err) {
      if (attemptsLeft > 1) {
        setTimeout(function() { unitsRpc(action, params, onDone, attemptsLeft - 1); }, 1500);
      } else {
        onDone(null, err);
      }
    })
    .doPost_internal(action, params || {});
}

function loadUnits() {
  document.getElementById('units-display').innerHTML = loadingHtml();
  var uDone = false, oDone = false, tDone = false, pDone = false;
  function tryRender() {
    if (uDone && oDone && tDone && pDone) unitsRenderPage();
  }
  unitsRpc('units.getAll', {}, function(res, err) {
    if (err) {
      document.getElementById('units-display').innerHTML =
        '<div style="color:var(--c-rejected-fg);padding:20px">Error: ' + err +
        ' <button class="btn btn-sm btn-outline" style="margin-left:10px" onclick="loadUnits()">↻ Retry</button></div>';
      return;
    }
    if (!res || !res.success) { showToast('Failed to load units','error'); return; }
    unitsAll = res.data || [];
    uDone = true; tryRender();
  });
  unitsRpc('owners.getAll', {}, function(r) {
    unitOwnerMap = {};
    var os = (r && r.success && r.data) ? r.data : [];
    for (var i = 0; i < os.length; i++) unitOwnerMap[String(os[i].unit_id).toUpperCase()] = os[i];
    oDone = true; tryRender();
  });
  unitsRpc('tenants.getAll', {}, function(r) {
    unitTenantMap = {};
    var ts = (r && r.success && r.data) ? r.data : [];
    for (var i = 0; i < ts.length; i++) unitTenantMap[String(ts[i].unit_id).toUpperCase()] = ts[i];
    tDone = true; tryRender();
  });
  unitsRpc('payments.getAll', {}, function(r) {
    unitsPayMap = {};
    var ps = (r && r.success && r.data) ? r.data : [];
    for (var i = 0; i < ps.length; i++) {
      var p = ps[i];
      if (p.status !== 'Verified') continue;
      unitsPayMap[String(p.unit_id).toUpperCase() + '|' + p.payment_type + '|' + p.month] = p.amount;
    }
    pDone = true; tryRender();
  });
}

// Count of paid months in a year for a unit/type (2023–2025 are settled = 12)
function unitsPaidCount(unitId, type, year) {
  if (year <= 2025) return 12;
  var n = 0;
  for (var m = 1; m <= 12; m++) {
    var mk = year + '-' + (m < 10 ? '0' + m : String(m));
    if (unitsPayMap[String(unitId).toUpperCase() + '|' + type + '|' + mk] !== undefined) n++;
  }
  return n;
}

// 12-month mini strip for the current year
function unitsPayStrip(unitId, type) {
  var year = (new Date()).getFullYear();
  var LBL = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  var MON = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var h = '<span style="white-space:nowrap">';
  for (var m = 1; m <= 12; m++) {
    var mk  = year + '-' + (m < 10 ? '0' + m : String(m));
    var amt = unitsPayMap[String(unitId).toUpperCase() + '|' + type + '|' + mk];
    var paid = amt !== undefined;
    h += '<span style="display:inline-block;width:18px;text-align:center;font-size:9px;font-weight:700;border-radius:3px;padding:2px 0;margin-right:1px;' +
      (paid ? 'background:var(--c-verified-bg);color:var(--c-verified-fg);'
            : 'background:var(--c-rejected-bg);color:var(--c-rejected-fg);opacity:.7;') + '" ' +
      'title="' + MON[m-1] + ' ' + year + (paid ? ': ₹' + amt : ': not paid') + '">' + LBL[m-1] + '</span>';
  }
  return h + '</span>';
}

function unitsRenderPage() {
  // Summary chips — based on the occupancy/registration flags
  var total = unitsAll.length, occ = 0, unocc = 0, notreg = 0;
  unitsAll.forEach(function(u) {
    if (u.occupancy === 'Unoccupied') unocc++; else occ++;
    if (u.registration === 'Not-registered') notreg++;
  });
  document.getElementById('units-summary').innerHTML =
    '<span class="pill pill-occupied">✓ ' + occ + ' Occupied</span>' +
    '<span class="pill" style="background:var(--c-rejected-bg);color:var(--c-rejected-fg);">◯ ' + unocc + ' Unoccupied</span>' +
    (notreg ? '<span class="pill" style="background:rgba(245,158,11,.18);color:#f59e0b;">⚠️ ' + notreg + ' Not-registered</span>' : '') +
    '<span class="pill" style="background:var(--accent);color:#fff;">Total: ' + total + '</span>';

  var filtered = unitsGetFiltered();
  if (unitsView === 'grid') unitsRenderGrid(filtered);
  else unitsRenderList(filtered);
}

function unitsGetFiltered() {
  var q      = document.getElementById('unit-search').value.toLowerCase();
  var tower  = document.getElementById('filter-tower').value;
  var status = document.getElementById('filter-status').value;
  return unitsAll.filter(function(u) {
    var mt = !tower  || u.tower === tower;
    var ms = !status ||
      (status === 'Occupied'       && u.occupancy !== 'Unoccupied') ||
      (status === 'Unoccupied'     && u.occupancy === 'Unoccupied') ||
      (status === 'Not-registered' && u.registration === 'Not-registered');
    if (!mt || !ms) return false;
    if (!q) return true;
    if (u.unit_id.toLowerCase().indexOf(q) > -1) return true;
    var o = unitOwnerMap[String(u.unit_id).toUpperCase()];
    var t = unitTenantMap[String(u.unit_id).toUpperCase()];
    function hit(v) { return v && String(v).toLowerCase().indexOf(q) > -1; }
    if (o && (hit(o.name) || hit(o.name2) || hit(o.name3) || hit(o.phone) || hit(o.phone2) ||
              hit(o.email) || hit(o.bank_names) || hit(o.tc_number) || hit(o.kseb_consumer_no))) return true;
    if (t && (hit(t.name) || hit(t.name2) || hit(t.phone) || hit(t.phone2) ||
              hit(t.email) || hit(t.bank_name))) return true;
    return false;
  });
}

function loadUnitsFilter()     { unitsRenderPage(); }
function loadUnitsToggleView() {
  unitsView = (unitsView === 'list') ? 'grid' : 'list';
  document.getElementById('view-toggle-btn').textContent = unitsView === 'list' ? 'Grid View' : 'List View';
  unitsRenderPage();
}

function unitsRenderList(units) {
  if (!units.length) {
    document.getElementById('units-display').innerHTML = emptyHtml('🏢','No units match your filters.');
    return;
  }
  function e(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  var year = (new Date()).getFullYear();
  var h = '<div class="card"><div class="card-body" style="padding:0">' +
    '<div class="table-wrap" style="max-height:70vh;overflow:auto"><table><thead><tr>' +
    '<th>Unit</th><th>Status</th><th>Owner</th><th>Owner Phone</th>' +
    '<th>Tenant</th><th>Tenant Phone</th>' +
    '<th>Registration</th><th>Corpus Fund</th><th>Owner is Tenant</th><th>Action</th>' +
    '</tr></thead><tbody>';
  for (var i = 0; i < units.length; i++) {
    var u  = units[i];
    var uk = String(u.unit_id).toUpperCase();
    var o  = unitOwnerMap[uk];
    var t  = unitTenantMap[uk];
    h += '<tr>' +
      '<td><strong style="cursor:pointer;color:var(--accent)" onclick="openUnitProfile(\'' + e(u.unit_id) + '\')">' + e(u.unit_id) + '</strong></td>' +
      '<td>' + (u.occupancy === 'Unoccupied'
          ? '<span class="pill" style="background:var(--c-rejected-bg);color:var(--c-rejected-fg);">Unoccupied</span>'
          : '<span class="pill pill-occupied">Occupied</span>') +
        (u.registration === 'Not-registered' ? ' <span class="pill" style="background:rgba(245,158,11,.18);color:#f59e0b;">⚠️ Not-reg.</span>' : '') + '</td>' +
      '<td style="min-width:150px">' + (o ? e(o.name) : '<span style="color:var(--text-muted);font-size:11px">—</span>') + '</td>' +
      '<td style="font-size:12px">' + (o && o.phone ? e(o.phone) : '—') + '</td>' +
      '<td style="min-width:130px">' + (t ? e(t.name) : '<span style="color:var(--text-muted);font-size:11px">—</span>') + '</td>' +
      '<td style="font-size:12px">' + (t && t.phone ? e(t.phone) : '—') + '</td>' +
      '<td>' + (u.registration === 'Not-registered'
          ? '<span class="pill" style="background:rgba(245,158,11,.18);color:#f59e0b;">Not-registered</span>'
          : '<span class="pill pill-occupied">Registered</span>') + '</td>' +
      '<td>' + (u.corpus_paid === 'Yes'
          ? '<span class="pill pill-occupied">✓ Paid</span>'
          : '<span class="pill" style="background:var(--c-rejected-bg);color:var(--c-rejected-fg);">Pending ₹' + Number(u.corpus_amount || 10000).toLocaleString('en-IN') + '</span>') + '</td>' +
      '<td style="text-align:center">' + (u.owner_is_tenant === 'Yes' ? '🧑‍🤝‍🧑 Yes' : (u.owner_is_tenant === 'No' ? 'No' : '<span style="color:var(--text-muted)">—</span>')) + '</td>' +
      '<td><button class="btn btn-sm btn-outline" onclick="openUnitProfile(\'' + e(u.unit_id) + '\')">View</button></td>' +
      '</tr>';
  }
  document.getElementById('units-display').innerHTML = h + '</tbody></table></div></div></div>';
}

function unitsRenderGrid(units) {
  if (!units.length) {
    document.getElementById('units-display').innerHTML = emptyHtml('🏢','No units match your filters.');
    return;
  }
  var byTower = { A:{}, B:{} };
  units.forEach(function(u) {
    if (!byTower[u.tower][u.floor]) byTower[u.tower][u.floor] = [];
    byTower[u.tower][u.floor].push(u);
  });

  var html = '';
  ['A','B'].forEach(function(tower) {
    var floors = byTower[tower];
    if (!Object.keys(floors).length) return;
    html += '<div class="card" style="margin-bottom:16px"><div class="card-header">' +
      '<span class="card-title">🏢 Tower ' + (tower==='A'?'One (A)':'Two (B)') + '</span></div>' +
      '<div class="card-body">';

    Object.keys(floors).map(Number).sort(function(a,b){return b-a;}).forEach(function(floor) {
      html += '<div style="margin-bottom:12px">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;letter-spacing:1px">Floor ' + floor + '</div>' +
        '<div class="unit-grid">';
      floors[floor].forEach(function(u) {
        // Colour by the unit's occupancy flag; amber warning ring if not registered
        var cls  = (u.occupancy === 'Unoccupied' ? 'unoccupied' : 'occupied') +
                   (u.registration === 'Not-registered' ? ' notreg' : '');
        var uk   = String(u.unit_id).toUpperCase();
        var o    = unitOwnerMap[uk];
        var t    = unitTenantMap[uk];
        var oname = o ? String(o.name).replace(/^(Mr|Mrs|Ms|Dr)\.?\s*/i,'').split(/[\/;]/)[0].trim() : '';
        if (oname.length > 14) oname = oname.slice(0, 13) + '…';
        html += '<div class="unit-tile ' + cls + '" onclick="openUnitProfile(\'' + u.unit_id + '\')" title="' +
          u.unit_id + ' — ' + (u.occupancy === 'Unoccupied' ? 'Unoccupied (UO)' : 'Occupied') +
          (u.registration === 'Not-registered' ? ' | NOT-REGISTERED' : '') +
          (o ? ' | Owner: ' + String(o.name).replace(/"/g,'') : '') +
          (t ? ' | Tenant: ' + String(t.name).replace(/"/g,'') : '') +
          ' | Corpus: ' + (u.corpus_paid === 'Yes' ? 'Paid' : 'Pending') +
          (u.owner_is_tenant === 'Yes' ? ' | Owner lives here' : '') + '">' +
          '<div style="font-size:11px;font-weight:800">' + u.unit_id + (u.registration === 'Not-registered' ? ' <span title="Not-registered">⚠️</span>' : '') + (u.owner_is_tenant === 'Yes' && u.occupancy !== 'Unoccupied' ? ' <span title="Owner is tenant (owner lives here)">🧑‍🤝‍🧑</span>' : '') + '</div>' +
          '<div style="font-size:8.5px;opacity:.85;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (oname || u.status) + '</div>' +
          '<div style="font-size:8px;margin-top:2px;font-weight:700;' +
            (u.corpus_paid === 'Yes' ? 'color:var(--c-verified-fg)' : 'color:var(--c-rejected-fg)') +
          '">' + (u.corpus_paid === 'Yes' ? 'Corpus ✓' : 'Corpus ✗') + '</div>' +
          '</div>';
      });
      html += '</div></div>';
    });
    html += '</div></div>';
  });
  document.getElementById('units-display').innerHTML = html;
}

// ── Quick detail modal (used after add/edit/delete actions) ─────
function viewUnitDetail(unitId) {
  openModal(loadingHtml('Loading…'));
  var owners, tenants, payments, done=0;
  function tryRender() {
    done++;
    if (done < 3) return;
    var unit = unitsAll.filter(function(u){ return u.unit_id===unitId; })[0] || {};
    var o = owners[0]||null, t = tenants[0]||null;
    var html =
      '<div class="modal-header"><span class="modal-title">🏢 Unit ' + unitId + '</span>' +
      '<button class="modal-close" onclick="closeModalForce()">✕</button></div>' +
      '<div class="modal-body">' +
      // Info row
      '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">' +
      '<div style="flex:1;min-width:120px;background:var(--bg-surface2);border-radius:var(--radius-sm);padding:12px">' +
        '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Tower</div>' +
        '<div style="font-weight:700">Tower ' + (unit.tower==='A'?'One (A)':'Two (B)') + '</div></div>' +
      '<div style="flex:1;min-width:120px;background:var(--bg-surface2);border-radius:var(--radius-sm);padding:12px">' +
        '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Floor</div>' +
        '<div style="font-weight:700">Floor ' + (unit.floor||'?') + '</div></div>' +
      '<div style="flex:1;min-width:120px;background:var(--bg-surface2);border-radius:var(--radius-sm);padding:12px">' +
        '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Status</div>' +
        '<div>' + pillStatus(unit.status||'Vacant') + '</div></div>' +
      '</div>' +
      // Owners
      '<div style="font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">' +
        '<span>👤 Owners (' + owners.length + ')</span>' +
        '<button class="btn btn-sm btn-accent" onclick="closeModalForce();openUnitProfile(\'' + unitId + '\')">Full Profile</button>' +
      '</div>' +
      (owners.length ? owners.map(function(ow) {
        return '<div style="padding:10px;background:var(--bg-surface2);border-radius:var(--radius-sm);margin-bottom:8px">' +
          '<div style="font-weight:600">' + ow.name + '</div>' +
          '<div style="font-size:12px;color:var(--text-muted)">' + (ow.phone||'') + (ow.email?' · '+ow.email:'') + '</div></div>';
      }).join('') : '<div style="color:var(--text-muted);font-size:13px">No owners added.</div>') +
      // Tenants
      '<div style="font-weight:700;margin:12px 0 8px;display:flex;justify-content:space-between;align-items:center">' +
        '<span>🏠 Tenants (' + tenants.length + ')</span>' +
        '<button class="btn btn-sm btn-primary" onclick="closeModalForce();showAddTenantModal(\'' + unitId + '\')">+ Add</button>' +
      '</div>' +
      (tenants.length ? tenants.map(function(tn) {
        return '<div style="padding:10px;background:var(--c-verified-bg);border-radius:var(--radius-sm);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">' +
          '<div><div style="font-weight:600">' + tn.name + '</div>' +
          '<div style="font-size:12px;color:var(--text-muted)">' + (tn.phone||'') + '</div>' +
          '<div style="font-size:11px;color:var(--text-muted)">Move-in: ' + formatDate(tn.move_in_date) + '</div></div>' +
          '<div style="display:flex;gap:6px">' +
          '<button class="btn btn-sm btn-danger" onclick="unitsRemoveTenant(\'' + tn.tenant_id + '\',\'' + unitId + '\')">✕</button>' +
          '</div></div>';
      }).join('') : '<div style="color:var(--text-muted);font-size:13px">No tenants.</div>') +
      // Recent payments
      '<div style="font-weight:700;margin:12px 0 8px">💳 Recent Payments</div>' +
      ((payments&&payments.length) ? payments.slice(0,5).map(function(p) {
        return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">' +
          '<span>' + p.payment_type + ' — ' + formatMonth(p.month) + '</span>' +
          '<span>' + formatRupees(p.amount) + ' ' + pillStatus(p.status) + '</span></div>';
      }).join('') : '<div style="color:var(--text-muted);font-size:13px">No payments yet.</div>') +
      '</div>';
    openModal(html);
  }

  google.script.run
    .withSuccessHandler(function(r){ owners=(r&&r.data)||[]; tryRender(); })
    .withFailureHandler(function(){ owners=[]; tryRender(); })
    .doPost_internal('owners.getByUnit',{ unit_id:unitId });

  google.script.run
    .withSuccessHandler(function(r){ tenants=(r&&r.data)||[]; tryRender(); })
    .withFailureHandler(function(){ tenants=[]; tryRender(); })
    .doPost_internal('tenants.getByUnit',{ unit_id:unitId });

  google.script.run
    .withSuccessHandler(function(r){ payments=(r&&r.data)||[]; tryRender(); })
    .withFailureHandler(function(){ payments=[]; tryRender(); })
    .doPost_internal('payments.getByUnit',{ unit_id:unitId, limit:5 });
}

function unitsRemoveTenant(tenantId, unitId) {
  if (!confirm('Remove this tenant?')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res&&res.success) {
        showToast('Tenant removed','success');
        loadUnits();
        viewUnitDetail(unitId);
      } else { showToast((res&&res.error)||'Failed','error'); }
    })
    .withFailureHandler(function(e){ showToast('Error: '+e,'error'); })
    .doPost_internal('tenants.remove',{ tenant_id:tenantId });
}

// ── Add Owner Modal ──────────────────────────────────────────────
function showAddOwnerModal(unitId) {
  openModal(
    '<div class="modal-header"><span class="modal-title">👤 Add Owner — ' + unitId + '</span>' +
    '<button class="modal-close" onclick="upBackToProfile(\'' + unitId + '\')">✕</button></div>' +
    '<div class="modal-body">' +
    '<div class="form-row">' +
      '<div class="form-group"><label>Full Name *</label><input id="own-name" placeholder="Owner name"></div>' +
      '<div class="form-group"><label>Phone</label><input id="own-phone" placeholder="+91 XXXXX XXXXX"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label>Email</label><input id="own-email" type="email" placeholder="email@example.com"></div>' +
      '<div class="form-group"><label>Living Status</label>' +
        '<select id="own-living"><option value="Non-Resident">Non-Resident</option><option value="Resident">Resident</option></select>' +
      '</div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label>Car Parking Slot</label><input id="own-parking" placeholder="e.g. P-12"></div>' +
      '<div class="form-group"><label>TC Number</label><input id="own-tc" placeholder="TC number"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label>KSEB Consumer No.</label><input id="own-kseb" placeholder="KSEB consumer number"></div>' +
      '<div class="form-group"><label>Address</label><input id="own-address" placeholder="Permanent address"></div>' +
    '</div>' +
    '<div class="form-actions">' +
      '<button class="btn btn-outline" onclick="upBackToProfile(\'' + unitId + '\')">Cancel</button>' +
      '<button class="btn btn-accent" onclick="unitsSubmitOwner(\'' + unitId + '\')">Add Owner</button>' +
    '</div></div>'
  );
}

function unitsSubmitOwner(unitId) {
  var data = {
    unit_id:         unitId,
    name:            document.getElementById('own-name').value.trim(),
    phone:           document.getElementById('own-phone').value.trim(),
    email:           document.getElementById('own-email').value.trim(),
    living_status:   document.getElementById('own-living').value,
    car_parking_slot:document.getElementById('own-parking').value.trim(),
    tc_number:       document.getElementById('own-tc').value.trim(),
    kseb_consumer_no:document.getElementById('own-kseb').value.trim(),
    address:         document.getElementById('own-address').value.trim()
  };
  if (!data.name) { showToast('Owner name is required','error'); return; }
  google.script.run
    .withSuccessHandler(function(res) {
      if (res&&res.success) { showToast('Owner added!','success'); if (typeof ownersAll !== 'undefined') ownersAll = []; upBackToProfile(unitId); loadUnits(); }
      else { showToast((res&&res.error)||'Failed','error'); }
    })
    .withFailureHandler(function(e){ showToast('Error: '+e,'error'); })
    .doPost_internal('owners.add', data);
}

// ── Add Tenant Modal ─────────────────────────────────────────────
function showAddTenantModal(unitId) {
  var today = new Date().toISOString().split('T')[0];
  openModal(
    '<div class="modal-header"><span class="modal-title">🏠 Add Tenant — ' + unitId + '</span>' +
    '<button class="modal-close" onclick="upBackToProfile(\'' + unitId + '\')">✕</button></div>' +
    '<div class="modal-body">' +
    '<div class="form-row">' +
      '<div class="form-group"><label>Full Name *</label><input id="ten-name" placeholder="Tenant name"></div>' +
      '<div class="form-group"><label>Phone</label><input id="ten-phone" placeholder="+91 XXXXX XXXXX"></div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label>Email</label><input id="ten-email" type="email" placeholder="email@example.com"></div>' +
      '<div class="form-group"><label>Move-in Date</label><input id="ten-movein" type="date" value="' + today + '"></div>' +
    '</div>' +
    '<div class="form-group"><label>Address</label><textarea id="ten-address" style="height:60px" placeholder="Address"></textarea></div>' +
    '<div class="form-actions">' +
      '<button class="btn btn-outline" onclick="upBackToProfile(\'' + unitId + '\')">Cancel</button>' +
      '<button class="btn btn-accent" onclick="unitsSubmitTenant(\'' + unitId + '\')">Add Tenant</button>' +
    '</div></div>'
  );
}

function unitsSubmitTenant(unitId) {
  var data = {
    unit_id:      unitId,
    name:         document.getElementById('ten-name').value.trim(),
    phone:        document.getElementById('ten-phone').value.trim(),
    email:        document.getElementById('ten-email').value.trim(),
    move_in_date: document.getElementById('ten-movein').value,
    address:      document.getElementById('ten-address').value.trim()
  };
  if (!data.name) { showToast('Tenant name is required','error'); return; }
  google.script.run
    .withSuccessHandler(function(res) {
      if (res&&res.success) {
        showToast('Tenant added! Unit marked Occupied.','success');
        if (typeof tenantsAll !== 'undefined') tenantsAll = [];
        upBackToProfile(unitId); loadUnits();
      } else { showToast((res&&res.error)||'Failed','error'); }
    })
    .withFailureHandler(function(e){ showToast('Error: '+e,'error'); })
    .doPost_internal('tenants.add', data);
}
</script>
