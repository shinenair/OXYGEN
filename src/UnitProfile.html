<!-- UnitProfile.html — Full Unit Profile Modal Content -->
<!-- Rendered inside the global modal via openUnitProfile(unitId) -->

<style>
  /* On phones, let the profile modal use nearly the full screen width
     instead of the fixed 900px cap set for desktop — the !important is
     needed because that cap is applied as an inline style from JS,
     which normally wins over any plain CSS rule. */
  @media (max-width: 480px) {
    #modal-box { max-width: 96vw !important; width: 96vw !important; }
    .up-detail-grid { grid-template-columns: 1fr !important; }
  }

  /* Reusable technique: any table given class="up-resp-table" collapses
     from a normal grid of columns into a stacked list of small cards on
     narrow screens — each row becomes one card, each cell becomes a
     labeled line (the label comes from that cell's own data-label
     attribute) instead of a column you have to scroll sideways to read. */
  @media (max-width: 560px) {
    .up-resp-table thead { display:none; }
    .up-resp-table, .up-resp-table tbody, .up-resp-table tr, .up-resp-table td { display:block; width:100%; }
    .up-resp-table tr {
      border:1px solid var(--border,rgba(128,128,128,.25)); border-radius:8px;
      margin-bottom:8px; padding:4px 0; background:var(--bg-surface2);
    }
    .up-resp-table td {
      text-align:right !important; padding:5px 10px !important;
      border:none !important; position:relative; padding-left:46% !important;
      min-height:20px;
    }
    .up-resp-table td[data-label]::before {
      content:attr(data-label); position:absolute; left:10px; top:5px;
      font-weight:700; text-align:left; color:var(--text-muted); font-size:11px;
    }
    .up-resp-table td:empty, .up-resp-table td[data-label=""] { display:none; }
    .up-resp-table tfoot tr { background:var(--bg-surface2); border-top:2px solid var(--border,rgba(128,128,128,.25)); }
  }
</style>

<script>
// ── Unit Profile Viewer ───────────────────────────────────────
// Called from Units.html View button — opens a full-screen style modal
// with all owner + tenant details matching the template format.

// Module-level state for the All-Payments filter panel
var upPayAll  = [];
var upPayUnit = '';

// Colour per payment type (matches the Transaction Ledger palette)
var UP_TYPE_COLORS = {
  'Maintenance':       { bg:'rgba(59,130,246,.16)',  fg:'#3b82f6' },
  'Waste Management':  { bg:'rgba(16,185,129,.16)',  fg:'#10b981' },
  'LPG':               { bg:'rgba(245,158,11,.18)',  fg:'#f59e0b' },
  'Caution Deposit':   { bg:'rgba(20,184,166,.16)',  fg:'#14b8a6' },
  'Party Hall Rental': { bg:'rgba(236,72,153,.16)',  fg:'#ec4899' },
  'Bank Interest':     { bg:'rgba(168,85,247,.16)',  fg:'#a855f7' },
  'Miscellaneous':     { bg:'rgba(100,116,139,.20)', fg:'#64748b' }
};
var UP_TYPE_LABELS = {
  'Maintenance':'Maintenance Fee', 'Waste Management':'Waste Management Fee',
  'LPG':'LPG', 'Caution Deposit':'Caution Deposit',
  'Party Hall Rental':'Party Hall Rental', 'Bank Interest':'Bank Interest',
  'Miscellaneous':'Miscellaneous'
};
function upTypeColor(v){ return UP_TYPE_COLORS[v] || { bg:'rgba(100,116,139,.18)', fg:'var(--text-muted)' }; }
function upTypeLabel(v){ return UP_TYPE_LABELS[v] || v || '—'; }

// Parse { year, month } from a bank date string (ISO, DD-Mon-YYYY, or numeric).
var UP_MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function upParseYM(d) {
  if (!d) return null;
  var s = String(d).trim(), low = s.toLowerCase();
  var mn = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  var iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (iso) return { year:parseInt(iso[1],10), month:parseInt(iso[2],10) };
  var nm = low.match(/(\d{1,2})[-\/ ]([a-z]{3})[a-z]*[-\/ ](\d{2,4})/);
  if (nm && mn[nm[2]]) { var y=parseInt(nm[3],10); if(y<100)y+=2000; return {year:y, month:mn[nm[2]]}; }
  var num = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/);
  if (num) { var yy=parseInt(num[3],10); if(yy<100)yy+=2000; var a=parseInt(num[1],10),b=parseInt(num[2],10); var m=b; if(b>12&&a<=12)m=a; return {year:yy, month:m}; }
  var ym = s.match(/(20\d{2})/);
  if (ym) { var mm=0; for(var k in mn){ if(low.indexOf(k)>-1){mm=mn[k];break;} } return {year:parseInt(ym[1],10), month:mm}; }
  return null;
}
// The amount a resident actually paid = the credit on the bank line.
function upTxnAmount(t){ return Number(t.credit||0) > 0 ? Number(t.credit) : Number(t.debit||0); }

// Coerce any stored date (ISO, DD/MM/YYYY, DD-Mon-YYYY) to YYYY-MM-DD so an
// <input type="date"> calendar can prefill it. Returns '' if unparseable.
function toDateInput(val) {
  if (!val) return '';
  var s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  var ym = upParseYM(s);   // handles DD-Mon-YYYY and numeric forms
  if (ym && ym.year && ym.month) {
    var day = 1;
    var dm = s.match(/^(\d{1,2})[-\/ ]/);
    if (dm) day = parseInt(dm[1], 10);
    var mm = ym.month < 10 ? '0' + ym.month : String(ym.month);
    var dd = day < 10 ? '0' + day : String(day);
    return ym.year + '-' + mm + '-' + dd;
  }
  var d = new Date(s);
  if (!isNaN(d.getTime())) {
    var mo = d.getMonth() + 1, da = d.getDate();
    return d.getFullYear() + '-' + (mo<10?'0'+mo:mo) + '-' + (da<10?'0'+da:da);
  }
  return '';
}

// ── Instant-open machinery ────────────────────────────────────
// The full profile payload needs a slow server call (it scans several
// whole sheets). Two tricks make opening feel immediate:
//  1. Session cache: each unit's last payload is kept for the session —
//     reopening renders the full profile INSTANTLY from it, while a
//     background fetch refreshes the data and silently re-renders.
//  2. Instant preview: on a first open, the list pages have already
//     loaded every unit/owner/tenant — the banner renders from that at
//     once, with a spinner where the ledger will appear.
var upProfileCache = {};  // unit_id -> last units.profile payload
var upOpenSeq = 0;        // guards against a slow response landing after
                          // the user closed this unit and opened another

// Basics (unit / first owner / first tenant) from whichever list page's
// cache happens to be loaded — Units page first, then Fees Received.
function _upCachedBasics(unitId) {
  var uk = String(unitId).toUpperCase();
  function findUnit(list) {
    if (!list || !list.length) return null;
    for (var i = 0; i < list.length; i++) if (String(list[i].unit_id).toUpperCase() === uk) return list[i];
    return null;
  }
  var unit = findUnit(typeof unitsAll !== 'undefined' ? unitsAll : null) ||
             findUnit(typeof feesUnits !== 'undefined' ? feesUnits : null);
  var owner  = (typeof unitOwnerMap  !== 'undefined' && unitOwnerMap[uk])  || (typeof feesOwners  !== 'undefined' && feesOwners[uk])  || null;
  var tenant = (typeof unitTenantMap !== 'undefined' && unitTenantMap[uk]) || (typeof feesTenants !== 'undefined' && feesTenants[uk]) || null;
  return { unit: unit, owner: owner, tenant: tenant };
}

function _upPreviewHtml(unitId, b) {
  var towerName = unitId[0] === 'A' ? 'Tower One (A)' : 'Tower Two (B)';
  var isOcc = !b.unit || b.unit.occupancy !== 'Unoccupied';
  var bannerBg = isOcc ? 'linear-gradient(135deg,#0b5e46,#0f7a5a)' : 'linear-gradient(135deg,#7a1f2b,#9b2c3a)';
  var pic = b.owner && b.owner.profile_picture ? _upPhotoUrl(b.owner.profile_picture) : '';
  return '<div style="display:flex;align-items:center;gap:16px;padding:16px 20px;background:' + bannerBg + ';border-radius:var(--radius-md);margin-bottom:20px;">' +
      (pic
        ? '<img src="' + _e(pic) + '" onerror="this.style.display=\'none\'" style="width:96px;height:96px;border-radius:14px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,.45);">'
        : '<div style="background:rgba(255,255,255,.16);color:#fff;border-radius:12px;width:96px;height:96px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;font-weight:700;flex-shrink:0;">' + _e(unitId) + '</div>') +
      '<div style="flex:1;">' +
        '<div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:#fff;">' + _e(unitId) + '</div>' +
        '<div style="color:rgba(255,255,255,.7);font-size:13px;">' + towerName + (b.unit ? ' · Floor ' + _e(b.unit.floor || '—') : '') + '</div>' +
        (b.owner && b.owner.name ? '<div style="color:#fff;font-size:15px;font-weight:700;margin-top:4px;">👤 ' + _e(b.owner.name) + '</div>' : '') +
        (b.tenant && b.tenant.name ? '<div style="color:rgba(255,255,255,.85);font-size:12.5px;margin-top:2px;">🏠 ' + _e(b.tenant.name) + '</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="loading"><div class="spinner"></div> Loading full profile…</div>';
}

function openUnitProfile(unitId, forceFresh) {
  upOpenSeq++;
  var seq = upOpenSeq;

  // Open modal immediately
  openModal(
    '<div class="modal-header" style="position:sticky;top:0;z-index:10;background:var(--bg-surface);">' +
      '<span class="modal-title">🏢 Unit ' + unitId + ' — Full Profile</span>' +
      '<button class="modal-close" onclick="closeModalForce()">✕</button>' +
    '</div>' +
    '<div class="modal-body" id="uprf-body">' +
      '<div class="loading"><div class="spinner"></div> Loading unit profile…</div>' +
    '</div>'
  );

  // Expand modal to nearly full screen
  var box = document.getElementById('modal-box');
  if (box) {
    box.style.maxWidth  = '900px';
    box.style.width     = '96vw';
    box.style.maxHeight = '92vh';
  }

  var cached = !forceFresh && upProfileCache[unitId];
  var unitFallback = _upCachedBasics(unitId).unit || { unit_id: unitId, tower: unitId[0], floor: unitId[1], status: '—' };

  if (cached) {
    // Full profile instantly from the session cache; the fetch below
    // refreshes it silently.
    renderProfile(unitId, cached.unit || unitFallback, cached.owners || [],
      cached.tenants || [], cached.payments || [], cached.bank || []);
  } else {
    // First open this session: rich preview from the list pages' data.
    var b = _upCachedBasics(unitId);
    if (b.unit || b.owner || b.tenant) {
      var pv = document.getElementById('uprf-body');
      if (pv) pv.innerHTML = _upPreviewHtml(unitId, b);
    }
  }

  google.script.run
    .withSuccessHandler(function(r) {
      var d = (r && r.success && r.data) ? r.data : {};
      upProfileCache[unitId] = d;
      // Only render if this profile is still the one on screen — the
      // user may have closed it or opened a different unit meanwhile.
      if (seq !== upOpenSeq || !document.getElementById('uprf-body')) return;
      renderProfile(unitId,
        d.unit     || unitFallback,
        d.owners   || [],
        d.tenants  || [],
        d.payments || [],
        d.bank     || []);
    })
    .withFailureHandler(function(e) {
      if (seq !== upOpenSeq) return;
      if (cached) return; // stale-but-rendered beats an error screen
      var body = document.getElementById('uprf-body');
      if (body) body.innerHTML = '<div style="color:var(--c-rejected-fg);padding:20px;">Failed to load profile: ' + e + '<br><br><button class="btn btn-sm btn-outline" onclick="openUnitProfile(\'' + unitId + '\')">Retry</button></div>';
    })
    .doPost_internal('units.profile', { unit_id: unitId });
}

function renderProfile(unitId, unit, owners, tenants, payments, bankTxns) {
  var body = document.getElementById('uprf-body');
  if (!body) return;

  // The All-Payments list is driven by actual bank transactions matched to
  // this unit; the MF/WMF/LPG grids continue to use the fees ledger.
  upPayAll  = bankTxns || [];
  upPayUnit = unitId;

  var towerName = (unit.tower === 'A') ? 'Tower One (A)' : 'Tower Two (B)';
  var html = '';

  // ── Unit Header — banner coloured by occupancy ───────────────
  var occ   = unit.occupancy    || 'Occupied';
  var reg   = unit.registration || 'Registered';
  var isOcc = occ === 'Occupied';
  var isReg = reg === 'Registered';
  var bannerBg = isOcc
    ? 'linear-gradient(135deg,#0b5e46,#0f7a5a)'   // green: occupied
    : 'linear-gradient(135deg,#7a1f2b,#9b2c3a)';  // red: unoccupied
  var occPill = isOcc
    ? '<span class="pill" style="background:rgba(255,255,255,.18);color:#c8ffe9;font-weight:700;">Occupied</span>'
    : '<span class="pill" style="background:rgba(0,0,0,.25);color:#ffd7dc;font-weight:700;">Unoccupied (UO)</span>';

  // Not-registered → red tint; MF is still applicable, paid as a lump sum at
  // registration along with the Corpus Fund.
  if (!isReg) {
    html += '<div style="background:var(--c-rejected-bg);border:1.5px solid var(--c-rejected-fg);color:var(--c-rejected-fg);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:600;">⚠️ NOT-REGISTERED UNIT — MF is paid as a lump sum at registration, along with the Corpus Fund.</div>';
  }

  html +=
    '<div style="display:flex;align-items:center;gap:16px;padding:16px 20px;background:' + bannerBg + ';border-radius:var(--radius-md);margin-bottom:20px;' + (!isReg ? 'box-shadow:inset 0 0 0 2px rgba(255,80,90,.55);' : '') + '">' +
      (function() {
        var pic = owners.length && owners[0].profile_picture ? owners[0].profile_picture : '';
        if (pic) {
          return '<img src="' + _e(_upPhotoUrl(pic)) + '" ' +
            'onclick="upShowBigPhoto(\'' + _e(pic) + '\',\'' + _e(unitId) + '\')" ' +
            'onerror="this.outerHTML=\'<div style=&quot;background:rgba(255,255,255,.16);color:#fff;border-radius:12px;width:96px;height:96px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;&quot;>' + unitId + '</div>\'" ' +
            'style="width:96px;height:96px;border-radius:14px;object-fit:cover;flex-shrink:0;cursor:zoom-in;border:2px solid rgba(255,255,255,.45);" ' +
            'title="Click to view full size">';
        }
        return '<div style="background:rgba(255,255,255,.16);color:#fff;border-radius:12px;width:96px;height:96px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;font-weight:700;flex-shrink:0;">' + unitId + '</div>';
      })() +
      '<div style="flex:1;">' +
        '<div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:#fff;">' + unitId + '</div>' +
        '<div style="color:rgba(255,255,255,.7);font-size:13px;">' + towerName + ' · Floor ' + (unit.floor||'—') + '</div>' +
        (owners.length && owners[0].name
          ? '<div style="color:#fff;font-size:15px;font-weight:700;margin-top:4px;">👤 ' + _e(owners[0].name) + (owners[0].name2 ? ' & ' + _e(owners[0].name2) : '') + '</div>'
          : '') +
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">' + occPill +
        (!isReg ? '<span class="pill" style="background:rgba(0,0,0,.3);color:#ffb3bb;font-weight:700;">Not-registered</span>' : '') +
      '</div>' +
    '</div>';

  // ── Unit Flags: occupancy + registration + corpus (editable) ──
  var corpusPaid = (unit.corpus_paid || 'No') === 'Yes';
  var lpgMode = unit.lpg_mode || 'Using';
  var corpusAmt  = unit.corpus_amount || '10000';
  html +=
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:20px;">' +
      '<div style="background:var(--bg-surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Occupancy</div>' +
        '<select id="up-flag-occ" onchange="upSaveFlags(\'' + _e(unitId) + '\')" style="width:100%;padding:6px 10px;font-size:13px;">' +
          '<option value="Occupied"'   + (isOcc ? ' selected' : '') + '>Occupied</option>' +
          '<option value="Unoccupied"' + (!isOcc ? ' selected' : '') + '>Unoccupied (UO)</option>' +
        '</select>' +
        '<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">' + (isOcc ? 'WMF & LPG applicable.' : 'Unoccupied — Waste Management Fee & LPG not applicable.') + '</div>' +
      '</div>' +
      '<div style="background:var(--bg-surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Registration</div>' +
        '<select id="up-flag-reg" onchange="upSaveFlags(\'' + _e(unitId) + '\')" style="width:100%;padding:6px 10px;font-size:13px;">' +
          '<option value="Registered"'     + (isReg ? ' selected' : '') + '>Registered</option>' +
          '<option value="Not-registered"' + (!isReg ? ' selected' : '') + '>Not-registered</option>' +
        '</select>' +
        '<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">' + (isReg ? 'Registered.' : 'MF paid as lump sum at registration, with Corpus Fund.') + '</div>' +
      '</div>' +
      '<div style="background:var(--bg-surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Corpus Fund Paid</div>' +
        '<div style="display:flex;gap:8px;">' +
          '<select id="up-flag-corpus" onchange="upSaveFlags(\'' + _e(unitId) + '\')" style="flex:1;padding:6px 10px;font-size:13px;">' +
            '<option value="Yes"' + (corpusPaid ? ' selected' : '') + '>Yes</option>' +
            '<option value="No"'  + (!corpusPaid ? ' selected' : '') + '>No</option>' +
          '</select>' +
          '<input id="up-flag-corpus-amt" type="number" value="' + _e(corpusAmt) + '" onchange="upSaveFlags(\'' + _e(unitId) + '\')" ' +
            'style="width:96px;padding:6px 10px;font-size:13px;" title="Corpus Fund amount (₹)">' +
        '</div>' +
        '<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">' + (corpusPaid ? '✓ Corpus Fund of ₹' + Number(corpusAmt).toLocaleString('en-IN') + ' paid.' : 'Corpus Fund of ₹' + Number(corpusAmt).toLocaleString('en-IN') + ' pending.') + '</div>' +
      '</div>' +
      '<div style="background:var(--bg-surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;">' +
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">🔥 LPG Mode</div>' +
        '<select id="up-flag-lpg" onchange="upSaveFlags(\'' + _e(unitId) + '\')" style="width:100%;padding:6px 10px;font-size:13px;">' +
          '<option value="Using"'        + (lpgMode === 'Using' ? ' selected' : '') + '>Using (piped LPG)</option>' +
          '<option value="Own Cylinder"' + (lpgMode === 'Own Cylinder' ? ' selected' : '') + '>Own Cylinder</option>' +
          '<option value="Not Using"'    + (lpgMode === 'Not Using' ? ' selected' : '') + '>Not Using</option>' +
        '</select>' +
        '<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">' +
          (lpgMode === 'Own Cylinder' ? 'Uses own cylinder — no meter reading or charge.'
            : lpgMode === 'Not Using' ? 'Not using LPG — no meter reading or charge.'
            : 'Billed monthly from the meter reading.') +
        '</div>' +
      '</div>' +
    '</div>';

  // ── Monthly Occupancy Timeline ──────────────────────────────

  // ── Owners Section ───────────────────────────────────────────
  html += '<div style="font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text-primary);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--accent);">👤 Owner Details</div>';

  if (!owners.length) {
    html += '<div style="margin-bottom:16px;padding:14px;background:var(--bg-surface2);border-radius:var(--radius-sm);text-align:center;">' +
      '<div style="color:var(--text-muted);font-size:13px;margin-bottom:10px;">No owner on record for this unit.</div>' +
      '<button class="btn btn-sm btn-primary" onclick="closeModalForce();setTimeout(function(){showAddOwnerModal(\'' + unitId + '\')},150);">+ Add Owner</button>' +
      '</div>';
  }

  owners.forEach(function(o, idx) {
    var v4w = _parseVehicles(o.vehicles_4w);
    var v2w = _parseVehicles(o.vehicles_2w);

    html += '<div style="background:var(--bg-surface2);border-radius:var(--radius-md);padding:18px;margin-bottom:16px;border:1px solid var(--border);">';

    // Owner header: photo + names + pills
    var avatar = o.profile_picture
      ? '<img src="' + _e(_upPhotoUrl(o.profile_picture)) + '" onerror="this.style.display=\'none\'" ' +
        'style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0;">'
      : '<div style="background:var(--accent-dim);color:var(--accent);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;">O' + (idx+1) + '</div>';

    var subNames = [];
    if (o.name2) subNames.push(o.name2);
    if (o.name3) subNames.push(o.name3);

    html +=
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">' +
        avatar +
        '<div>' +
          '<div style="font-weight:700;font-size:16px;">' + _e(o.name) +
            (o.owner_id && !isNaN(parseInt(o.owner_id,10)) ? ' <span style="color:var(--text-muted);font-size:11px;font-weight:600">#' + _e(o.owner_id) + '</span>' : '') +
          '</div>' +
          (subNames.length ? '<div style="font-size:12px;color:var(--text-muted);">' + _e(subNames.join(' · ')) + '</div>' : '') +
        '</div>' +

      '<button class="btn btn-outline btn-sm" onclick="closeModalForce()">Close</button>' +
    '</div>';

  body.innerHTML = html;
  // Not-registered → soft red wash over the whole profile window
  body.style.background   = !isReg ? 'rgba(220,60,80,.07)' : '';
  body.style.borderRadius = !isReg ? 'var(--radius-md)' : '';
  upRenderPayments();
  upParkedLoad(unitId);
  upTimelineLoad(unitId);
}

// Collapsed by default so opening a profile makes ONE server call, not
// two — the reading history loads only when the person actually asks for it.
function upToggleLpgHistory(unitId) {
  var box = document.getElementById('up-lpg-history');
  var btn = document.getElementById('up-lpg-hist-btn');
  if (!box) return;
  if (box.style.display !== 'none') {
    box.style.display = 'none';
    if (btn) btn.innerHTML = '🔥 View LPG Reading History';
    return;
  }
  box.style.display = 'block';
  if (btn) btn.innerHTML = '🔼 Hide LPG Reading History';
  if (box.getAttribute('data-loaded') === '1') return; // already fetched once
  box.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px;">Loading…</div>';
  upLoadLpgHistory(unitId);
}

var upLpgHistoryUnitId = null;
var upLpgHistoryData = null;
var upLpgHistoryYear = null;

function upLoadLpgHistory(unitId) {
  upLpgHistoryUnitId = unitId;
  google.script.run.withSuccessHandler(function(r) {
    var list = (r && r.success && r.data) ? r.data : [];
    upLpgHistoryData = list;
    var el = document.getElementById('up-lpg-history');
    if (!el) return;
    el.setAttribute('data-loaded', '1');
    if (!list.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;background:var(--bg-surface2);border-radius:var(--radius-sm);">No LPG readings recorded yet.</div>'; return; }
    if (!upLpgHistoryYear) upLpgHistoryYear = list[0].year; // newest year with data, by default
    upRenderLpgHistory();
  }).withFailureHandler(function() {
    var el = document.getElementById('up-lpg-history');
    if (el) el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Could not load LPG history.</div>';
  }).doPost_internal('lpg.getUnitHistory', { unit_id: unitId });
}

function upRenderLpgHistory() {
  var el = document.getElementById('up-lpg-history');
  if (!el || !upLpgHistoryData) return;
  var mn = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  var years = [];
  upLpgHistoryData.forEach(function(d) { if (years.indexOf(d.year) === -1) years.push(d.year); });
  years.sort(function(a, b) { return b - a; });
  var yearOpts = years.map(function(y) { return '<option value="' + y + '"' + (y === upLpgHistoryYear ? ' selected' : '') + '>' + y + '</option>'; }).join('');

  var rows = upLpgHistoryData.filter(function(d) { return d.year === upLpgHistoryYear; }).sort(function(a, b) { return a.month - b.month; });

  var h = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">' +
    '<label style="font-size:11px;color:var(--text-muted);">Year</label>' +
    '<select onchange="upLpgHistoryYear=Number(this.value);upRenderLpgHistory();" style="padding:4px 8px;font-size:12px;">' + yearOpts + '</select>' +
    '<span style="font-size:10.5px;color:var(--text-muted);margin-left:6px;">"Paid" is looked up from next month\'s actual LPG payment — e.g. December\'s row shows what was paid in January.</span>' +
  '</div>';

  h += '<div class="table-wrap" style="max-height:320px;overflow:auto;border:1px solid var(--border);border-radius:8px;"><table class="up-resp-table" style="border-collapse:collapse;width:100%;font-size:12px;">' +
    '<thead><tr style="background:var(--bg-surface2)">' +
    '<th style="text-align:left;padding:6px 8px;">Month</th><th style="text-align:right;padding:6px 8px;">Prev</th>' +
    '<th style="text-align:right;padding:6px 8px;">Curr</th><th style="text-align:right;padding:6px 8px;">Consumed</th>' +
    '<th style="text-align:right;padding:6px 8px;">Calculated</th><th style="text-align:right;padding:6px 8px;">Paid</th>' +
    '<th style="padding:6px 8px;">Payment Date</th>' +
    '<th style="padding:6px 8px;">Status</th><th style="padding:6px 8px;"></th></tr></thead><tbody>';

  var sumCalc = 0, sumPaid = 0;
  rows.forEach(function(d) {
    sumCalc += d.amount || 0;
    sumPaid += d.live_paid_amount || 0;
    var isMismatch = d.live_status === 'Mismatch';
    var isUnpaid = d.live_status === 'Unpaid';
    var statusHtml = isMismatch ? '<span style="color:#f59e0b;font-weight:700">⚠️ Mismatch</span>'
      : d.live_status === 'Paid' ? '<span style="color:var(--c-verified-fg)">✓ Paid</span>'
      : isUnpaid ? '<span style="color:var(--c-rejected-fg);font-weight:700">⛔ Unpaid</span>'
      : '<span style="color:var(--text-muted)">Pending</span>';
    h += '<tr style="border-top:1px solid var(--border);' + ((isMismatch || isUnpaid) ? 'background:rgba(245,158,11,.10);' : '') + '">' +
      '<td data-label="Month" style="padding:6px 8px;font-weight:700">' + mn[d.month] + ' ' + d.year + '</td>' +
      '<td data-label="Prev" style="text-align:right;padding:6px 8px;">' + d.previous_reading + '</td>' +
      '<td data-label="Curr" style="text-align:right;padding:6px 8px;">' + d.current_reading + '</td>' +
      '<td data-label="Consumed" style="text-align:right;padding:6px 8px;">' + d.consumed + '</td>' +
      '<td data-label="Calculated" style="text-align:right;padding:6px 8px;font-weight:700">' + (isFinite(d.amount) ? '₹' + Math.round(d.amount).toLocaleString('en-IN') : '—') + '</td>' +
      '<td data-label="Paid" style="text-align:right;padding:6px 8px;">' + (d.live_paid_amount != null && isFinite(d.live_paid_amount) ? '₹' + Math.round(d.live_paid_amount).toLocaleString('en-IN') : '—') + '</td>' +
      '<td data-label="Payment Date" style="padding:6px 8px;color:var(--text-muted);">' + (d.live_payment_date ? formatDate(d.live_payment_date) : '—') + '</td>' +
      '<td data-label="Status" style="padding:6px 8px;">' + statusHtml + (d.flagged ? ' <span title="Flagged' + (d.flag_note ? ': ' + _e(d.flag_note) : '') + '" style="cursor:help;">🚩</span>' : '') + '</td>' +
      '<td data-label="" style="padding:6px 8px;white-space:nowrap;">' +
        (APP_ROLE === 'admin' ? '<button class="btn btn-xs btn-outline" onclick="upOpenLpgFlag(\'' + d.reading_id + '\')" title="Admin: flag this month\'s comparison as incorrect">' + (d.flagged ? '✏️' : '🚩') + '</button>' : '') +
      '</td></tr>';
  });

  var mismatchTotal = Math.abs(sumPaid - sumCalc) > 0.5;
  h += '</tbody><tfoot><tr style="border-top:2px solid var(--border);font-weight:800;background:var(--bg-surface2);">' +
    '<td data-label="" colspan="4" style="padding:7px 8px;">TOTAL — ' + upLpgHistoryYear + '</td>' +
    '<td data-label="Calculated" style="text-align:right;padding:7px 8px;">₹' + Math.round(sumCalc).toLocaleString('en-IN') + '</td>' +
    '<td data-label="Paid" style="text-align:right;padding:7px 8px;">₹' + Math.round(sumPaid).toLocaleString('en-IN') + '</td>' +
    '<td data-label=""></td>' +
    '<td data-label="" colspan="2" style="padding:7px 8px;' + (mismatchTotal ? 'color:#f59e0b;' : 'color:var(--c-verified-fg);') + '">' +
      (mismatchTotal ? '⚠️ Totals differ by ₹' + Math.round(Math.abs(sumPaid - sumCalc)).toLocaleString('en-IN') : '✓ Totals match') +
    '</td></tr></tfoot></table></div>';

  el.innerHTML = h;
}

function upOpenLpgFlag(readingId) {
  var d = null;
  upLpgHistoryData.forEach(function(x) { if (x.reading_id === readingId) d = x; });
  if (!d) return;
  var mn = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  openModal('<div class="modal-header"><span class="modal-title">🚩 Flag — ' + mn[d.month] + ' ' + d.year + '</span>' +
    '<button class="modal-close" onclick="closeModalForce()">✕</button></div><div class="modal-body">' +
    '<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">Calculated ₹' + Math.round(d.amount).toLocaleString('en-IN') +
      ' vs Paid ' + (d.live_paid_amount !== null ? '₹' + Math.round(d.live_paid_amount).toLocaleString('en-IN') : '(nothing recorded yet)') +
      '. Flagging is purely informational — it never changes any amount or payment, it just records that a human looked at this and found it wrong.</div>' +
    '<div class="form-group"><label>Note</label><textarea id="uplf-note" rows="3" style="width:100%;" placeholder="e.g. Resident paid for the wrong month by mistake">' + _e(d.flag_note || '') + '</textarea></div>' +
    '<div class="form-actions">' +
      (d.flagged ? '<button class="btn btn-outline" style="color:var(--c-rejected-fg);margin-right:auto;" onclick="upSaveLpgFlag(\'' + readingId + '\',false)">Remove flag</button>' : '') +
      '<button class="btn btn-outline" onclick="closeModalForce()">Cancel</button>' +
      '<button class="btn btn-accent" onclick="upSaveLpgFlag(\'' + readingId + '\',true)">🚩 Save Flag</button>' +
    '</div></div>');
}

function upSaveLpgFlag(readingId, flagged) {
  var note = (document.getElementById('uplf-note') || {}).value || '';
  google.script.run.withSuccessHandler(function(r) {
    if (r && r.success) { showToast(flagged ? 'Flagged' : 'Flag removed', 'success'); closeModalForce(); upLoadLpgHistory(upLpgHistoryUnitId); }
    else showToast((r && r.error) || 'Failed', 'error');
  }).withFailureHandler(function(e) { showToast('Error: ' + e, 'error'); })
    .doPost_internal('lpg.setFlag', { reading_id: readingId, flagged: flagged, note: note });
}

// Close whatever modal is open and return to the Unit Full Profile.
// Used by the edit windows' Cancel / ✕ so closing an edit never dumps the
// user back to the Units page. Always re-fetches (forceFresh) — an edit
// may just have changed this unit, and briefly flashing the pre-edit
// cached data would look like the save didn't happen.
function upBackToProfile(unitId) {
  closeModalForce();
  setTimeout(function() { openUnitProfile(unitId, true); }, 120);
}

// Same, but WITHOUT the forced re-fetch — for pure viewing detours
// (like the big photo) where nothing could have changed: the profile
// reopens instantly from the session cache, and the cached open's own
// background refresh still keeps it honest.
function upBackToProfileCached(unitId) {
  closeModalForce();
  setTimeout(function() { openUnitProfile(unitId); }, 120);
}

// Save the occupancy / registration flags, then re-render the profile so the
// banner colour, ribbon and fee notes update immediately.
function upSaveFlags(unitId) {
  var occ = (document.getElementById('up-flag-occ') || {}).value || '';
  var reg = (document.getElementById('up-flag-reg') || {}).value || '';
  var cp  = (document.getElementById('up-flag-corpus') || {}).value || '';
  var ca  = (document.getElementById('up-flag-corpus-amt') || {}).value || '';
  var oitEl = document.getElementById('up-flag-oit');
  var oit = oitEl ? oitEl.value : undefined;
  var lpgEl = document.getElementById('up-flag-lpg');
  var lpg = lpgEl ? lpgEl.value : undefined;
  google.script.run
    .withSuccessHandler(function(r) {
      if (r && r.success) {
        showToast('Unit flags updated', 'success');
        openUnitProfile(unitId, true);
        if (typeof loadUnits === 'function') loadUnits();
      } else { showToast((r && r.error) || 'Failed to update', 'error'); }
    })
    .withFailureHandler(function(e) { showToast('Error: ' + e, 'error'); })
    .doPost_internal('units.updateFlags', { unit_id: unitId, occupancy: occ, registration: reg, corpus_paid: cp, corpus_amount: ca, owner_is_tenant: oit, lpg_mode: lpg });
}

// ── All-Payments filter + row rendering (bank transactions) ────
// ═══ Parked Funds — the manual month-allocation home ═══
// Money assigned to this unit via bank-transaction portions sits here
// as a parked balance per fee type until the user manually allocates
// it to months. Nothing is ever posted or deleted automatically.
var upParkedData = null;
var upParkedUnitId = null;

// ═══ Monthly Occupancy & LPG Mode Timeline ═══
// Each month shows the EFFECTIVE value (carried forward from the last
// explicit change, or the unit's default if nothing's been set yet).
// A small dot marks months with their own explicit entry; editing any
// month sets a new "from this month on" change, which itself then
// carries forward until the next explicit change.
var upTimelineUnitId = null;
var upTimelineYear = new Date().getFullYear();
var upTimelineData = null;

function upTimelineLoad(unitId) {
  upTimelineUnitId = unitId;
  var wrap = document.getElementById('up-timeline-wrap');
  if (!wrap) return;
  google.script.run.withSuccessHandler(function(r) {
    if (!r || !r.success) { wrap.innerHTML = ''; return; }
    upTimelineData = r.data;
    upTimelineRender();
  }).withFailureHandler(function() { wrap.innerHTML = ''; })
    .doPost_internal('occupancy.getYearView', { unit_id: unitId, year: upTimelineYear });
}

function upTimelineChangeYear(delta) {
  upTimelineYear += delta;
  upTimelineLoad(upTimelineUnitId);
}

function upTimelineRender() {
  var wrap = document.getElementById('up-timeline-wrap');
  var d = upTimelineData;
  if (!wrap || !d) return;

  var mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var occColor = { 'Occupied': '#10b981', 'Unoccupied': '#f59e0b' };
  var lpgColor = { 'Using': '#10b981', 'Own Cylinder': '#3b82f6', 'Not Using': '#64748b' };

  var h = '<div style="font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text-primary);margin:20px 0 6px;padding-bottom:6px;border-bottom:2px solid var(--gold,#f59e0b);">🗓️ Monthly Occupancy &amp; LPG Mode</div>' +
    '<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">Set the month a change actually took effect — every month after it carries the same value automatically, until the next change. A resident present even one day in a month counts that whole month as Occupied. Drives Waste Management &amp; LPG applicability everywhere in OXYGEN.</div>' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">' +
      '<button class="btn btn-xs btn-outline" onclick="upTimelineChangeYear(-1)">◀</button>' +
      '<strong style="font-size:13px;">' + upTimelineYear + '</strong>' +
      '<button class="btn btn-xs btn-outline" onclick="upTimelineChangeYear(1)">▶</button>' +
      '<a href="#" onclick="upShowRawEntries();return false;" style="margin-left:auto;font-size:11px;color:var(--accent);text-decoration:underline;" title="See every explicit entry ever set for this unit, across all years — useful if a value isn\'t carrying forward as expected">🔍 See all explicit entries</a>' +
    '</div>' +
    '<div class="table-wrap" style="overflow-x:auto;"><table style="min-width:760px;font-size:12px;"><thead><tr>' +
      '<th style="text-align:left;">Month</th>';
  d.months.forEach(function(mo, i) { h += '<th style="text-align:center;">' + mn[i] + '</th>'; });
  h += '</tr></thead><tbody>';

  h += '<tr><td style="font-weight:600;">Occupancy</td>';
  d.months.forEach(function(mo, i) {
    var c = occColor[mo.occupancy] || '#64748b';
    h += '<td style="text-align:center;padding:3px;">' +
      '<div onclick="upTimelineEdit(\'' + mo.month + '\',\'occupancy\')" title="Click to change — effective from ' + mo.month + ' onward" ' +
      'style="cursor:pointer;border-radius:5px;padding:4px 2px;font-size:10.5px;font-weight:700;background:' + c + '22;color:' + c + ';position:relative;">' +
      (mo.occupancy === 'Occupied' ? 'Occ' : 'Unocc') +
      (mo.occupancy_explicit ? '<span style="position:absolute;top:1px;right:2px;font-size:7px;" title="Explicitly set this month">●</span>' : '') +
      '</div></td>';
  });
  h += '</tr>';

  h += '<tr><td style="font-weight:600;">LPG Mode</td>';
  d.months.forEach(function(mo, i) {
    var c = lpgColor[mo.lpg_mode] || '#64748b';
    var label = mo.lpg_mode === 'Using' ? 'Piped' : mo.lpg_mode === 'Own Cylinder' ? 'Own Cyl.' : 'Not Using';
    h += '<td style="text-align:center;padding:3px;">' +
      '<div onclick="upTimelineEdit(\'' + mo.month + '\',\'lpg_mode\')" title="Click to change — effective from ' + mo.month + ' onward" ' +
      'style="cursor:pointer;border-radius:5px;padding:4px 2px;font-size:10.5px;font-weight:700;background:' + c + '22;color:' + c + ';position:relative;">' +
      label +
      (mo.lpg_mode_explicit ? '<span style="position:absolute;top:1px;right:2px;font-size:7px;" title="Explicitly set this month">●</span>' : '') +
      '</div></td>';
  });
  h += '</tr></tbody></table></div>';
  wrap.innerHTML = h;
}

function upTimelineEdit(month, attribute) {
  var isOcc = attribute === 'occupancy';
  var options = isOcc ? ['Occupied', 'Unoccupied'] : ['Using', 'Own Cylinder', 'Not Using'];
  var mo = null;
  upTimelineData.months.forEach(function(m) { if (m.month === month) mo = m; });
  var current = mo ? mo[attribute] : options[0];
  var isExplicit = mo ? mo[attribute + '_explicit'] : false;

  var optHtml = options.map(function(o) { return '<option value="' + o + '"' + (o === current ? ' selected' : '') + '>' + o + '</option>'; }).join('');
  var h = '<div class="modal-header"><span class="modal-title">' + (isOcc ? '🏠 Occupancy' : '🔥 LPG Mode') + ' — ' + month + '</span>' +
    '<button class="modal-close" onclick="closeModalForce()">✕</button></div><div class="modal-body">' +
    '<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">This sets ' + month + '\'s value — every month AFTER it will automatically use the same value too, until you set a different one for some later month.</div>' +
    '<div class="form-group"><label>Value</label><select id="ut-value" style="width:100%;">' + optHtml + '</select></div>' +
    '<div class="form-actions">' +
      (isExplicit ? '<button class="btn btn-outline" style="color:var(--c-rejected-fg);margin-right:auto;" onclick="upTimelineRemoveEntry(\'' + month + '\',\'' + attribute + '\')" title="' + month + ' currently has its own specific setting. This undoes that and makes ' + month + ' go back to matching whatever the month before it was set to.">↩️ Undo this month\'s change</button>' : '') +
      '<button class="btn btn-outline" onclick="closeModalForce()">Cancel</button>' +
      '<button class="btn btn-accent" onclick="upTimelineSave(\'' + month + '\',\'' + attribute + '\')">💾 Save</button>' +
    '</div></div>';
  openModal(h);
}

function upTimelineSave(month, attribute) {
  var value = document.getElementById('ut-value').value;
  doPostWithHistoryConfirm('occupancy.setStatus',
    { unit_id: upTimelineUnitId, attribute: attribute, effective_month: month, value: value },
    function(r) {
      if (r && r.success) { showToast('Saved — effective from ' + month + ' onward', 'success'); closeModalForce(); setTimeout(function(){ openUnitProfile(upTimelineUnitId, true); }, 150); }
      else showToast((r && r.error) || 'Failed', 'error');
    },
    function(e) { showToast('Error: ' + e, 'error'); });
}

function upTimelineRemoveEntry(month, attribute) {
  // Need the entry_id — fetch this attribute's full timeline to find it,
  // since the year-view doesn't carry ids for entries outside the
  // currently-viewed year's explicit set.
  google.script.run.withSuccessHandler(function(r) {
    if (!r || !r.success) { showToast('Could not look up the entry', 'error'); return; }
    var entry = null;
    r.data.forEach(function(e) { if (e.effective_month === month) entry = e; });
    if (!entry) { showToast('No explicit entry found for that month', 'error'); return; }
    doPostWithHistoryConfirm('occupancy.deleteEntry', { entry_id: entry.entry_id },
      function(r2) {
        if (r2 && r2.success) { showToast('Removed — inherits the prior value again', 'success'); closeModalForce(); setTimeout(function(){ openUnitProfile(upTimelineUnitId, true); }, 150); }
        else showToast((r2 && r2.error) || 'Failed', 'error');
      },
      function(e) { showToast('Error: ' + e, 'error'); });
  }).withFailureHandler(function(e) { showToast('Error: ' + e, 'error'); })
    .doPost_internal('occupancy.getTimeline', { unit_id: upTimelineUnitId, attribute: attribute });
}

// Shows every explicit entry ever set for this unit — both Occupancy
// and LPG Mode, every year, not just the one currently in view. This is
// the ground truth behind the computed carry-forward table above: if a
// value isn't carrying forward the way it seems like it should, the
// answer is always visible here (a later entry you forgot about, or one
// left over from earlier testing, is what's actually overriding it).
function upShowRawEntries() {
  google.script.run.withSuccessHandler(function(r) {
    if (!r || !r.success) { showToast((r && r.error) || 'Failed to load', 'error'); return; }
    var entries = r.data;
    var h = '<div class="modal-header"><span class="modal-title">🔍 All Explicit Entries — ' + upTimelineUnitId + '</span>' +
      '<button class="modal-close" onclick="closeModalForce()">✕</button></div><div class="modal-body">';
    if (!entries.length) {
      h += '<div style="color:var(--text-muted);padding:12px 0;">No explicit entries at all — every month, every year, is currently just following this unit\'s default Occupancy/LPG Mode settings above.</div>';
    } else {
      h += '<div style="font-size:11.5px;color:var(--text-muted);margin-bottom:10px;">Every one of these is a specific month where something other than the default was explicitly set. Each stays in effect until the NEXT entry for the same attribute (in date order) — that\'s why a change can appear to "stop" partway through a year, if another entry already exists further along.</div>';
      h += '<table style="width:100%;font-size:12.5px;"><thead><tr><th style="text-align:left;">Month</th><th style="text-align:left;">Attribute</th><th style="text-align:left;">Value</th><th></th></tr></thead><tbody>';
      entries.forEach(function(e) {
        h += '<tr><td>' + e.effective_month + '</td><td>' + (e.attribute === 'occupancy' ? 'Occupancy' : 'LPG Mode') + '</td>' +
          '<td style="font-weight:700;">' + e.value + '</td>' +
          '<td><button class="btn btn-xs btn-outline" style="color:var(--c-rejected-fg);" onclick="upDeleteRawEntry(\'' + e.entry_id + '\')">🗑 Delete</button></td></tr>';
      });
      h += '</tbody></table>';
    }
    h += '<div class="form-actions"><button class="btn btn-outline" onclick="closeModalForce()">Close</button></div></div>';
    openModal(h);
  }).withFailureHandler(function(e) { showToast('Error: ' + e, 'error'); })
    .doPost_internal('occupancy.getAllEntriesForUnit', { unit_id: upTimelineUnitId });
}

function upDeleteRawEntry(entryId) {
  if (!confirm('Delete this entry? The affected month(s) will go back to inheriting whatever was in effect before it.')) return;
  doPostWithHistoryConfirm('occupancy.deleteEntry', { entry_id: entryId },
    function(r) {
      if (r && r.success) { showToast('Deleted', 'success'); closeModalForce(); setTimeout(function(){ openUnitProfile(upTimelineUnitId, true); }, 150); }
      else showToast((r && r.error) || 'Failed', 'error');
    },
    function(e) { showToast('Error: ' + e, 'error'); });
}

function upParkedLoad(unitId) {
  upParkedUnitId = unitId;
  var wrap = document.getElementById('up-parked-wrap');
  if (!wrap) return;
  google.script.run.withSuccessHandler(function(r) {
    if (!r || !r.success) { wrap.innerHTML = ''; return; }
    upParkedData = r.data;

function upAllocRefresh(remaining) {
  var total = 0;
  for (var m = 1; m <= 12; m++) {
    var el = document.getElementById('up-alloc-m' + m);

  }
  var el2 = document.getElementById('up-alloc-total');
  if (!el2) return;
  var left = Math.round((remaining - total) * 100) / 100;
  el2.innerHTML = 'Entered: ' + formatRupees(total) + ' · ' +
    (left >= -0.005
      ? '<span style="color:var(--text-muted);">' + formatRupees(Math.max(0, left)) + ' will remain parked</span>'
      : '<span style="color:var(--c-rejected-fg);">exceeds the unallocated balance by ' + formatRupees(-left) + ' — Save will refuse</span>');

function upSaveAllocation(type, remaining) {
  var year = Number((document.getElementById('up-alloc-year') || {}).value);
  if (!year || year < 2000 || year > 2100) { showToast('Enter a valid year', 'error'); return; }
  var months = {};
  var total = 0;
  for (var m = 1; m <= 12; m++) {
    var el = document.getElementById('up-alloc-m' + m);
    var v = el ? Number(el.value) : 0;
    if (v > 0) { months[year + '-' + (m < 10 ? '0' + m : m)] = v; total += v; }
  }
  if (!total) { showToast('Enter at least one month amount', 'error'); return; }
  if (total - remaining > 0.005) { showToast('Entered ' + total + ' exceeds the unallocated ' + remaining + ' — nothing saved', 'error'); return; }
  doPostWithHistoryConfirm('portions.allocate',
    { unit_id: upParkedUnitId, payment_type: type, months: months },
    function(r) {
      if (r && r.success) {
        showToast('Allocated ' + r.data.created.length + ' month(s) — ' + formatRupees(r.data.remaining) + ' still parked', 'success');
        upParkedLoad(upParkedUnitId);

function upRenderPayments() {
  var box = document.getElementById('up-pay-rows');
  if (!box) return;
  var yr = (document.getElementById('up-pay-year')  || {}).value || '';
  var mo = (document.getElementById('up-pay-month') || {}).value || '';
  var ty = (document.getElementById('up-pay-type')  || {}).value || '';

  var list = (upPayAll || []).filter(function(t) {
    var ym = upParseYM(t.date);
    if (yr && (!ym || ym.year !== parseInt(yr,10)))  return false;
    if (mo && (!ym || ym.month !== parseInt(mo,10))) return false;
    if (ty && t.payment_type !== ty)                 return false;
    return true;
  });
  // Newest transaction date first
  list.sort(function(a,b){
    var ya=upParseYM(a.date), yb=upParseYM(b.date);
    var ka=ya?(ya.year*100+ya.month):0, kb=yb?(yb.year*100+yb.month):0;
    if (kb!==ka) return kb-ka;
    return String(b.date||'').localeCompare(String(a.date||''));
  });

  if (!list.length) {
    box.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:12px;background:var(--bg-surface2);border-radius:var(--radius-sm);">No transactions match these filters.</div>';
    return;
  }

  var total = 0;
  list.forEach(function(t){ total += upTxnAmount(t); });

  var rows = '';
  list.forEach(function(t) {
    var c = upTypeColor(t.payment_type);
    var amt = upTxnAmount(t);
    var payer = t.parsed_name || t.match_name || '';
    var typePill = (t.payment_type && t.payment_type!=='Unknown')
      ? '<span class="pill" style="background:'+c.bg+';color:'+c.fg+';font-weight:600;font-size:11px;">' + _e(upTypeLabel(t.payment_type)) + '</span>'
      : '<span style="font-size:11px;color:var(--text-muted);font-style:italic;">Unclassified</span>';
    // Transactions from the second bank account carry a small badge so
    // it's always clear which account the money actually arrived in.
    if (t.account === '2') typePill += ' <span class="pill" title="This payment arrived in the older IOB LPG account, not the main account" style="background:rgba(245,158,11,.15);color:#f59e0b;font-weight:600;font-size:10px;">🔥 IOB LPG A/c</span>';
    var sub = payer ? '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">' + _e(payer) + '</div>' : '';
    if (t.note) sub += '<div style="font-size:11px;color:var(--text-muted);margin-top:1px;">📝 ' + _e(t.note) + '</div>';
    rows +=
      '<div style="display:flex;align-items:flex-start;gap:12px;padding:9px 12px;border-bottom:1px solid var(--border);">' +
        '<div style="width:96px;font-size:12px;font-weight:600;color:var(--text-secondary);flex-shrink:0;">' + _e(t.date) + '</div>' +
        '<div style="flex:1;min-width:0;">' + typePill + sub + '</div>' +
        '<div style="width:100px;text-align:right;font-weight:700;font-size:13px;flex-shrink:0;color:var(--c-verified-fg);">₹' + Number(amt).toLocaleString('en-IN') + '</div>' +
      '</div>';
  });

  box.innerHTML =
    '<div style="border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;">' + rows + '</div>' +
    '<div style="display:flex;justify-content:space-between;font-size:12px;margin-top:8px;padding:0 4px;color:var(--text-muted);">' +
      '<span>' + list.length + ' transaction' + (list.length===1?'':'s') + ' shown</span>' +
      '<span style="font-weight:700;color:var(--c-verified-fg);">₹' + total.toLocaleString('en-IN') + ' total</span>' +
    '</div>';
}

function upHistoryHtml(kind, list) {
  if (!list.length) {
    return '<div style="color:var(--text-muted);font-size:12px;padding:10px;background:var(--bg-surface2);border-radius:var(--radius-sm);">No archived ' + (kind === 'owner' ? 'owners' : 'residents') + ' for this unit.</div>';
  }
  var h = '<div style="border:1px dashed var(--border-strong,var(--border));border-radius:var(--radius-sm);overflow:hidden;">';
  list.forEach(function(p, i) {
    var when = upFmtArchiveDate(p.archived_at);

    if (kind === 'tenant' && (p.move_in_date || p.move_out_date)) {
      period = (p.move_in_date ? formatDate(p.move_in_date) : '?') + ' → ' + (p.move_out_date ? formatDate(p.move_out_date) : '?');
    }

      '<div style="display:flex;justify-content:space-between;gap:10px;align-items:baseline;">' +
        '<span style="font-weight:700;font-size:13px;">' + _e(p.name || '—') + (p.name2 ? ' & ' + _e(p.name2) : '') + '</span>' +
        '<span style="font-size:11px;color:var(--text-muted);">Archived ' + _e(when) + '</span>' +
      '</div>' +
      (phones ? '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">📞 ' + _e(phones) + '</div>' : '') +
      (p.email ? '<div style="font-size:11px;color:var(--text-muted);">✉️ ' + _e(p.email) + '</div>' : '') +
      (period ? '<div style="font-size:11px;color:var(--text-muted);">🗓 ' + _e(period) + '</div>' : '') +
      (p.bank_names ? '<div style="font-size:11px;color:var(--text-muted);">🏦 ' + _e(p.bank_names) + '</div>' : '') +
      '</div>';
  });
  h += '</div>';
  return h;
}

function upFmtArchiveDate(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso).slice(0, 10);
  var mns = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var day = d.getDate();
  return (day < 10 ? '0' + day : String(day)) + ' ' + mns[d.getMonth()] + ' ' + d.getFullYear();
}

// Drive link -> displayable thumbnail URL
function _upPhotoUrl(link) {
  if (!link) return '';
  var m = String(link).match(/[-\w]{25,}/);
  if (m && link.indexOf('drive.google') > -1) {
    return 'https://drive.google.com/thumbnail?id=' + m[0] + '&sz=w400';
  }
  return link;
}

function _upPill(status) {
  var map = {
    'Occupied':'pill-occupied','Vacant':'pill-vacant',
    'Verified':'pill-verified','Pending':'pill-pending','Rejected':'pill-rejected',
    'Resident':'pill-resident','Non-Resident':'pill-non-resident'
  };
  return '<span class="pill ' + (map[status]||'') + '">' + _e(status) + '</span>';
}

function _parseVehicles(jsonStr) {
  if (!jsonStr || jsonStr === '[]' || jsonStr === '') return [];
  try { return JSON.parse(jsonStr); } catch(e) { return []; }
}

function _e(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function ownersUploadPhoto(ownerId) {
  var inp    = document.getElementById('oe-pic-file');
  var btn    = document.getElementById('oe-pic-upload-btn');
  var status = document.getElementById('oe-pic-upload-status');

  function say(msg) { if (status) status.textContent = msg; }

  if (!inp || !inp.files || inp.files.length === 0) { say('Choose an image file first.'); return; }
  var file = inp.files[0];
  if (file.type.indexOf('image/') !== 0) { say('Please choose an image (JPG/PNG).'); return; }
  if (file.size > 4 * 1024 * 1024) { say('Image too large — please use one under 4 MB.'); return; }

  if (btn) { btn.disabled = true; btn.textContent = '⏳ Uploading…'; }
  say('Reading file…');

  var reader = new FileReader();
  reader.onerror = function() {
    if (btn) { btn.disabled = false; btn.textContent = '📤 Upload Photo'; }
    say('Could not read the file.');
  };
  reader.onload = function(ev) {
    var arr = new Uint8Array(ev.target.result);
    var bin = '';
    for (var i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
    say('Uploading to Drive…');

    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) { btn.disabled = false; btn.textContent = '📤 Upload Photo'; }
        if (!res || !res.success) { say('Upload failed: ' + (res ? res.error : 'no response')); return; }
        var url = res.data && res.data.url ? res.data.url : '';
        say('✓ Uploaded and saved!');
        // Update the URL field + preview in the open modal
        var urlInp = document.getElementById('oe-pic');
        if (urlInp) urlInp.value = url;
        var prev = document.getElementById('oe-pic-preview');
        if (prev) { prev.src = ownersPhotoUrl(url); prev.style.display = ''; }
        // Update local cache so the table/thumbnail reflect it immediately
        var o = ownersFind(ownerId);
        if (o) o.profile_picture = url;
        if (typeof loadUnits === 'function') loadUnits();
      })
      .withFailureHandler(function(err) {
        if (btn) { btn.disabled = false; btn.textContent = '📤 Upload Photo'; }
        say('Error: ' + String(err));
      })
      .uploadOwnerPhoto({
        owner_id: ownerId,
        content:  btoa(bin),
        filename: file.name,
        mimeType: file.type
      });
  };
  reader.readAsArrayBuffer(file);
}

function tnE(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function tnParseVehicles(jsonStr) {
  try {
    var a = JSON.parse(jsonStr || '[]');
    return (a && a.length !== undefined) ? a : [];
  } catch (e) { return []; }
}

function tenantsFind(tenantId) {
  for (var i = 0; i < tenantsAll.length; i++) {
    if (tenantsAll[i].tenant_id === tenantId) return tenantsAll[i];
  }
  return null;
}
