<!-- Documents.html — the association's shared Google Drive "Documents"
     folder, listed live inside OXYGEN. Anything added to the folder in
     Drive appears here on refresh; every row opens the file in Drive. -->

<div class="page-header">
  <div>
    <h1 class="page-title">📁 Documents</h1>
    <p class="page-subtitle">The association's shared document folder — listed live from Google Drive, click any item to open it</p>
  </div>
  <button class="btn btn-outline btn-sm" id="docs-open-drive" onclick="docsOpenDrive()">🔗 Open in Google Drive</button>
  <button class="btn btn-outline btn-sm" onclick="docsLoad(true)">🔄 Refresh</button>
</div>

<div class="card">
  <div class="card-body">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <input id="docs-search" type="text" placeholder="🔍 Search documents…" oninput="docsRender()" style="flex:1;min-width:220px;padding:8px 12px;font-size:13px;">
      <span id="docs-count" style="font-size:12px;color:var(--text-muted);white-space:nowrap;"></span>
    </div>
    <div id="docs-body"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
var docsData = null;

function docsOpenDrive() {
  var url = (docsData && docsData.folderUrl) ? docsData.folderUrl : 'https://drive.google.com/drive/u/1/folders/1nPaTaNr5Yvyd3rxFYDACzvbvBZJO0KnH';
  window.open(url, '_blank');
}

function docsMimeIcon(item) {
  if (item.kind === 'folder') return '📁';
  var m = String(item.mime || '');
  if (m.indexOf('pdf') > -1) return '📕';
  if (m.indexOf('spreadsheet') > -1 || m.indexOf('excel') > -1) return '📊';
  if (m.indexOf('document') > -1 || m.indexOf('word') > -1) return '📝';
  if (m.indexOf('presentation') > -1 || m.indexOf('powerpoint') > -1) return '📽️';
  if (m.indexOf('image') > -1) return '🖼️';
  if (m.indexOf('video') > -1) return '🎬';
  if (m.indexOf('zip') > -1 || m.indexOf('compressed') > -1) return '🗜️';
  return '📄';
}

function docsLoad(isManualRefresh) {
  var body = document.getElementById('docs-body');
  if (body && (isManualRefresh || !docsData)) body.innerHTML = loadingHtml('Reading the Drive folder…');
  google.script.run.withSuccessHandler(function(r) {
    if (!r || !r.success) { if (body) body.innerHTML = '<div style="color:var(--c-rejected-fg);padding:14px;">Error: ' + formsE(r ? r.error : 'failed') + '</div>'; return; }
    if (!r.data.configured) {
      if (body) body.innerHTML = '<div style="background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;">The Documents folder URL is empty. Paste the shared Drive folder\'s URL in <strong>Settings → 📁 Documents</strong> and save, then refresh here.</div>';
      return;
    }
    docsData = r.data;
    docsRender();
  }).withFailureHandler(function(e) {
    if (body) body.innerHTML = '<div style="color:var(--c-rejected-fg);padding:14px;">Error: ' + formsE(e) + '</div>';
  }).doPost_internal('docs.list', {});
}

function docsRender() {
  var d = docsData;
  var body = document.getElementById('docs-body');
  var countEl = document.getElementById('docs-count');
  if (!body || !d) return;

  var q = String((document.getElementById('docs-search') || {}).value || '').toLowerCase().trim();
  var items = d.items;
  if (q) items = items.filter(function(it) { return it.name.toLowerCase().indexOf(q) > -1; });

  if (countEl) countEl.textContent = items.length + ' of ' + d.count + ' item' + (d.count === 1 ? '' : 's') + ' · folder: ' + d.folderName;

  if (!d.count) { body.innerHTML = '<div style="color:var(--text-muted);padding:14px;">The folder is empty. Anything uploaded to it in Google Drive appears here.</div>'; return; }
  if (!items.length) { body.innerHTML = '<div style="color:var(--text-muted);padding:14px;">No documents match your search.</div>'; return; }

  var h = '<div class="table-wrap" style="max-height:70vh;overflow:auto;"><table class="forms-table"><thead><tr>' +
    '<th style="width:44px;">#</th><th>Name</th><th>Last Updated</th><th>Size</th><th style="width:70px;">Open</th>' +
    '</tr></thead><tbody>';
  items.forEach(function(it, i) {
    h += '<tr>' +
      '<td style="font-weight:700;color:var(--text-muted);">' + (i + 1) + '</td>' +
      '<td>' + docsMimeIcon(it) + ' ' + formsE(it.name) + (it.kind === 'folder' ? ' <span style="font-size:11px;color:var(--text-muted);">(folder)</span>' : '') + '</td>' +
      '<td style="white-space:nowrap;">' + formsE(it.updated) + '</td>' +
      '<td style="white-space:nowrap;">' + formsE(it.size) + '</td>' +
      '<td><a href="' + formsE(it.url) + '" target="_blank" rel="noopener" style="text-decoration:underline;color:var(--accent);font-weight:600;">Open ↗</a></td>' +
    '</tr>';
  });
  h += '</tbody></table></div>';
  body.innerHTML = h;
}

function documentsPageInit() { docsLoad(); }
</script>
