<!-- MoveInOut.html — also defines the SHARED loader/renderer used by all
     three Community Form pages (Party Hall and Vehicle Tracking reuse
     everything below; they only provide their own container + config). -->

<style>
  /* Community Forms tables — clear vertical column separators and a
     prominent sticky header, since form responses have many wide text
     columns that blur together without hard borders. */
  .forms-table td, .forms-table th { border: 1px solid var(--border, rgba(128,128,128,.35)); }
  .forms-table thead th {
    background: var(--accent-dim, rgba(59,130,246,.15));
    color: var(--text-primary);
    font-weight: 800;
    font-size: 12.5px;
    text-transform: uppercase;
    letter-spacing: .3px;
    position: sticky; top: 0; z-index: 2;
  }
  .forms-table tbody tr:nth-child(even) td { background: rgba(128,128,128,.05); }
</style>

<div class="page-header">
  <div>
    <h1 class="page-title">📦 Move-In / Move-Out</h1>
    <p class="page-subtitle">Responses from the Move-In/Move-Out Google Form — resident arrivals and departures, live from the form's response sheet</p>
  </div>
  <button class="btn btn-outline btn-sm" onclick="window.open(formsConfig.movein.formUrl, '_blank')">🔗 Open the Form</button>
  <button class="btn btn-outline btn-sm" onclick="formsLoad('movein', true)">🔄 Refresh</button>
</div>

<div class="card">
  <div class="card-body">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <input id="forms-movein-search" type="text" placeholder="🔍 Search responses…" oninput="formsFilter('movein')" style="flex:1;min-width:220px;padding:8px 12px;font-size:13px;">
      <span id="forms-movein-count" style="font-size:12px;color:var(--text-muted);white-space:nowrap;"></span>
    </div>
    <div id="forms-movein-body"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
// ── Shared Community Forms machinery (used by all three pages) ──
var formsConfig = {
  movein:    { formUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSeUOMZTpOehfAubvlc24HQ0lHFMXBLDbb18KTSJlzSbnIf08w/viewform', settingLabel: 'Move-In/Out' },
  partyhall: { formUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSe_1SDBGvyhZm_TXlzpel07lxljmoHsTYCUUbhjKFbUQt5_8w/viewform', settingLabel: 'Party Hall Rental' },
  vehicle:   { formUrl: 'https://docs.google.com/forms/d/e/1FAIpQLScdiVns_rZMZJgUM64t0SKO4otVH2hEPdw6EGiTC71oL1OWJg/viewform', settingLabel: 'Vehicle Tracking' }
};
var formsData = {}; // kind -> { headers, rows }

function formsE(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formsLoad(kind, isManualRefresh) {
  var body = document.getElementById('forms-' + kind + '-body');
  if (body && (isManualRefresh || !formsData[kind])) body.innerHTML = loadingHtml('Reading the response sheet…');
  google.script.run.withSuccessHandler(function(r) {
    if (!r || !r.success) { if (body) body.innerHTML = '<div style="color:var(--c-rejected-fg);padding:14px;">Error: ' + formsE(r ? r.error : 'failed') + '</div>'; return; }
    if (!r.data.configured) {
      if (body) body.innerHTML =
        '<div style="background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;line-height:1.6;">' +
        '<strong>One-time setup needed.</strong> This page reads the ' + formsE(formsConfig[kind].settingLabel) + ' form\'s responses live from its linked Google Sheet:<br>' +
        '1. Open the form in edit mode → <strong>Responses</strong> tab → click the Sheets icon (<strong>View in Sheets</strong>).<br>' +
        '2. Copy that spreadsheet\'s URL from the browser.<br>' +
        '3. Paste it in <strong>Settings → 📋 Community Forms → ' + formsE(formsConfig[kind].settingLabel) + ' — responses spreadsheet URL</strong> and save.<br>' +
        'Then come back here and hit 🔄 Refresh — every response, including future ones, appears automatically.</div>';
      return;
    }
    formsData[kind] = r.data;
    formsRender(kind);
  }).withFailureHandler(function(e) {
    if (body) body.innerHTML = '<div style="color:var(--c-rejected-fg);padding:14px;">Error: ' + formsE(e) + '</div>';
  }).doPost_internal('forms.getResponses', { kind: kind });
}

function formsRender(kind) {
  var d = formsData[kind];
  var body = document.getElementById('forms-' + kind + '-body');
  var countEl = document.getElementById('forms-' + kind + '-count');
  if (!body || !d) return;

  var q = String((document.getElementById('forms-' + kind + '-search') || {}).value || '').toLowerCase().trim();
  // Number entries in SUBMISSION order (#1 = the oldest response) so an
  // entry keeps its number permanently as new responses arrive on top.
  var numbered = d.rows.map(function(row, i) { return { n: d.count - i, row: row, dup: !!(d.likelyDup && d.likelyDup[i]) }; });
  var rows = numbered;
  if (q) rows = numbered.filter(function(e) { return e.row.join(' ').toLowerCase().indexOf(q) > -1; });

  var likelyCount = 0;
  numbered.forEach(function(e) { if (e.dup) likelyCount++; });
  if (countEl) countEl.textContent = rows.length + ' of ' + d.count + ' response' + (d.count === 1 ? '' : 's') +
    (d.duplicatesRemoved ? ' · ' + d.duplicatesRemoved + ' exact duplicate' + (d.duplicatesRemoved === 1 ? '' : 's') + ' hidden' : '') +
    (likelyCount ? ' · ⚠️ ' + likelyCount + ' possible duplicate' + (likelyCount === 1 ? '' : 's') + ' highlighted' : '');

  if (!d.count) { body.innerHTML = '<div style="color:var(--text-muted);padding:14px;">No responses yet. Once someone submits the form, their response appears here.</div>'; return; }
  if (!rows.length) { body.innerHTML = '<div style="color:var(--text-muted);padding:14px;">No responses match your search.</div>'; return; }

  var h = '<div class="table-wrap" style="max-height:70vh;overflow:auto;"><table class="forms-table" style="min-width:900px;"><thead><tr>';
  h += '<th style="width:44px;">#</th>';
  d.headers.forEach(function(hd) { h += '<th style="white-space:nowrap;">' + formsE(hd) + '</th>'; });
  h += '</tr></thead><tbody>';
  rows.forEach(function(e) {
    var dupAttr = e.dup ? ' style="background:rgba(245,158,11,.10);" title="⚠️ Possible duplicate — same flat, name and direction as another entry. Review and remove the outdated one in the response sheet if appropriate."' : '';
    h += '<tr' + dupAttr + '><td style="font-weight:700;color:var(--text-muted);">' + e.n + (e.dup ? ' ⚠️' : '') + '</td>';
    e.row.forEach(function(cell) { h += '<td style="max-width:280px;">' + formsE(cell) + '</td>'; });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  body.innerHTML = h;
}

function formsFilter(kind) { formsRender(kind); }

// ── This page's init (called on first navigation) ──
function moveinPageInit() { formsLoad('movein'); }
</script>
