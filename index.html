<!DOCTYPE html>
<!-- ══════════════════════════════════════════════════════════════
     OXYGEN — GitHub Pages entrance
     This page REDIRECTS to the OXYGEN Apps Script web app.

     Why redirect instead of embedding in an iframe: the app requires
     Google sign-in, and modern browsers (Firefox today, others soon)
     block Google's sign-in cookies inside a cross-site frame — an
     embedded app 403s even for signed-in users. A top-level redirect
     makes the app first-party, so sign-in works in every browser.

     ►► IF YOU EVER CREATE A NEW APPS SCRIPT DEPLOYMENT (new /exec
        URL), update the ONE line marked "APP URL" below. ◄◄
     ══════════════════════════════════════════════════════════════ -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OXYGEN — Confident Daffodils Owners Association</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='82' cy='100' r='62' fill='none' stroke='%2306B6D4' stroke-width='26'/%3E%3Ctext x='138' y='158' font-family='Arial' font-weight='800' font-size='72' fill='%2322D3EE'%3E2%3C/text%3E%3C/svg%3E">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #04101c; }
    #loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #04101c; color: #9FB8CC;
      font-family: Arial, Helvetica, sans-serif; font-size: 14px;
      text-align: center; padding: 20px;
    }
    .ring {
      width: 46px; height: 46px;
      border: 4px solid rgba(6,182,212,.2);
      border-top-color: #06B6D4;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #22D3EE; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="ring"></div>
    <div>Opening OXYGEN…</div>
    <div style="font-size:12px;opacity:.7;">Not redirected? <a id="manual-link" href="#">Tap here to open the app.</a></div>
  </div>

  <script>
    /* ▼▼▼ APP URL — the only line to change after a new deployment ▼▼▼ */
    var APP_URL = 'https://script.google.com/macros/s/AKfycbzrnL4jWaOYxUiyrco-lJTeb3Txvi471xl6SBI7p_tQW-NGighahdVNywhEGpGh4Ndr/exec';
    /* ▲▲▲ APP URL ▲▲▲ */

    document.getElementById('manual-link').href = APP_URL;
    /* replace() keeps this page out of Back-button history, so Back
       from the app leaves the site instead of bouncing endlessly. */
    window.location.replace(APP_URL);
  </script>

</body>
</html>
