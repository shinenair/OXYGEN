<!DOCTYPE html>
<!-- ══════════════════════════════════════════════════════════════
     OXYGEN — public front-door (GitHub Pages)
     This repo (shinenair/OXYGEN, PUBLIC) contains ONLY this file.
     The application code lives in the private repo: shinenair/OXYGEN-app.

     This page shows the OXYGEN Apps Script web app full-screen, exactly
     like the Google Sites embed did — the embed hides Google's Apps
     Script banner.

     ►► IF YOU EVER CREATE A NEW APPS SCRIPT DEPLOYMENT (new /exec URL),
        update the ONE line marked "APP URL" below — HERE, in this repo. ◄◄
     ══════════════════════════════════════════════════════════════ -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OXYGEN — Confident Daffodils Owners Association</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='82' cy='100' r='62' fill='none' stroke='%2306B6D4' stroke-width='26'/%3E%3Ctext x='138' y='158' font-family='Arial' font-weight='800' font-size='72' fill='%2322D3EE'%3E2%3C/text%3E%3C/svg%3E">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #04101c; }
    iframe#app {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
    /* Loading screen — visible until the app arrives */
    #loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #04101c; color: #9FB8CC;
      font-family: Arial, Helvetica, sans-serif; font-size: 14px;
      transition: opacity .4s ease;
    }
    #loader.done { opacity: 0; pointer-events: none; }
    .ring {
      width: 46px; height: 46px;
      border: 4px solid rgba(6,182,212,.2);
      border-top-color: #06B6D4;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loader">
    <div class="ring"></div>
    <div>Loading OXYGEN…</div>
  </div>

  <!-- ▼▼▼ APP URL — the only line to change after a new deployment ▼▼▼ -->
  <iframe id="app" allow="clipboard-write"
    src="https://script.google.com/macros/s/AKfycbzrnL4jWaOYxUiyrco-lJTeb3Txvi471xl6SBI7p_tQW-NGighahdVNywhEGpGh4Ndr/exec"
    onload="document.getElementById('loader').classList.add('done')"></iframe>
  <!-- ▲▲▲ APP URL ▲▲▲ -->

</body>
</html>
